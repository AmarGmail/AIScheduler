name: Daily AI News Report
on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Set lower case repo name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Login to GHCR
        uses: docker/login-action@v4
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Run AI News Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }} # New Secret
        run: |
          docker pull ghcr.io/${{ env.REPO_LC }}:latest
          docker run --rm \
            -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            -e EMAIL_USER="${{ secrets.EMAIL_USER }}" \
            -e EMAIL_PASS="${{ secrets.EMAIL_PASS }}" \
            -e HEALTHCHECK_URL="$HEALTHCHECK_URL" \
            ghcr.io/${{ env.REPO_LC }}:latest