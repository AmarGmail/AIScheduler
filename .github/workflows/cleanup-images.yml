name: Cleanup Old Images
on:
  schedule:
    - cron: '20 1 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch:   # Allows manual trigger from Actions tab

jobs:
  delete-old-images:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete older images
        uses: actions/delete-package-versions@v4
        with:
          # Use the lowercase name of your package
          package-name: 'aischeduler'
          package-type: 'container'
          # Best Practice: Keep a small buffer of versions
          min-versions-to-keep: 3
          # Clean up untagged 'ghost' images left by new builds
          delete-only-untagged-versions: 'true'
